name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run lint
        run: |
          pip install flake8
          flake8 .

      - name: Run tests
        run: |
          pytest


      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Run dbt deps
        run: dbt deps

      - name: Run dbt debug
        run: dbt debug

      - name: Run dbt tests
        run: dbt test